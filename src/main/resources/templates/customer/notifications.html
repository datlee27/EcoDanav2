<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>

<body class="bg-gray-50">

<!-- Navigation -->
<div th:replace="~{fragments/nav :: nav}"></div>

<!-- Main Content -->
<main class="pt-20 pb-16">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Thông báo</h1>
            <p class="text-gray-600">Tất cả thông báo của bạn</p>
        </div>

        <!-- Actions -->
        <div class="flex justify-between items-center mb-6">
            <div class="text-sm text-gray-600">
                <span th:text="${unreadCount}">0</span> thông báo chưa đọc
            </div>
            <button onclick="markAllAsRead()" 
                    class="text-sm text-green-600 hover:text-green-700 font-medium">
                <i class="fas fa-check-double mr-1"></i>
                Đánh dấu tất cả đã đọc
            </button>
        </div>

        <!-- Notifications List -->
        <div th:if="${notifications.isEmpty()}" class="bg-white rounded-lg shadow-md p-12 text-center">
            <i class="fas fa-bell-slash text-6xl text-gray-300 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">Chưa có thông báo</h3>
            <p class="text-gray-500">Bạn sẽ nhận được thông báo khi có cập nhật mới</p>
        </div>

        <div th:if="${!notifications.isEmpty()}" class="space-y-3">
            <div th:each="notification : ${notifications}" 
                 th:classappend="${!notification.isRead ? 'bg-blue-50 border-l-4 border-blue-500' : 'bg-white'}"
                 class="rounded-lg shadow-sm p-4 hover:shadow-md transition-all">
                
                <div class="flex items-start justify-between">
                    <div class="flex-1">
                        <!-- Icon based on type -->
                        <div class="flex items-start mb-2">
                            <i th:class="${notification.notificationType == 'BOOKING_APPROVED' ? 'fas fa-check-circle text-green-500' :
                                         notification.notificationType == 'BOOKING_REJECTED' ? 'fas fa-times-circle text-red-500' :
                                         notification.notificationType == 'BOOKING_COMPLETED' ? 'fas fa-flag-checkered text-purple-500' :
                                         'fas fa-bell text-blue-500'}"
                               class="text-xl mr-3 mt-1"></i>
                            <div class="flex-1">
                                <p class="text-gray-800" th:text="${notification.message}">Notification message</p>
                                <p class="text-xs text-gray-500 mt-1">
                                    <i class="far fa-clock mr-1"></i>
                                    <span th:text="${#temporals.format(notification.createdDate, 'dd/MM/yyyy HH:mm')}">01/01/2025 10:00</span>
                                </p>
                            </div>
                        </div>
                        
                        <!-- Action button if has related booking -->
                        <div th:if="${notification.relatedId != null}" class="mt-3">
                            <a th:href="@{'/booking/confirmation/' + ${notification.relatedId}}" 
                               class="inline-block text-sm text-green-600 hover:text-green-700 font-medium">
                                <i class="fas fa-eye mr-1"></i>
                                Xem chi tiết đơn đặt xe
                            </a>
                        </div>
                    </div>
                    
                    <!-- Actions -->
                    <div class="flex items-center space-x-2 ml-4">
                        <button th:if="${!notification.isRead}"
                                th:onclick="|markAsRead('${notification.notificationId}')|"
                                class="p-2 text-gray-400 hover:text-green-600 transition-colors"
                                title="Đánh dấu đã đọc">
                            <i class="fas fa-check"></i>
                        </button>
                        <button th:onclick="|deleteNotification('${notification.notificationId}')|"
                                class="p-2 text-gray-400 hover:text-red-600 transition-colors"
                                title="Xóa">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    function markAsRead(notificationId) {
        fetch(`/notifications/${notificationId}/read`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                location.reload();
            }
        })
        .catch(error => console.error('Error:', error));
    }

    function markAllAsRead() {
        fetch('/notifications/mark-all-read', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                location.reload();
            }
        })
        .catch(error => console.error('Error:', error));
    }

    function deleteNotification(notificationId) {
        if (!confirm('Bạn có chắc muốn xóa thông báo này?')) {
            return;
        }

        fetch(`/notifications/${notificationId}`, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                location.reload();
            }
        })
        .catch(error => console.error('Error:', error));
    }
</script>

</body>
</html>
