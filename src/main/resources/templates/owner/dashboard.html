<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
<style>
    .primary { color: #4CAF50; }
    .bg-primary { background-color: #4CAF50; }
    .hidden { display: none; }
</style>
<div th:replace="~{fragments/nav :: nav}"></div>
<div th:replace="~{owner/owner-sidebar :: sidebar}"></div>

<div class="ml-64 mt-16">
    <div class="bg-white shadow-sm border-b">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Owner Dashboard</h1>
                    <p class="text-gray-600">An overview of your rental business</p>
                </div>
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center">
                        <i class="fas fa-user text-white text-lg"></i>
                    </div>
                    <div>
                        <p class="font-semibold text-gray-800" th:text="${currentUser?.firstName + ' ' + currentUser?.lastName ?: 'Owner'}">Owner</p>
                        <p class="text-sm text-gray-600">Car Owner</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 py-6">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-800 mb-2">
                Welcome back, <span th:text="${currentUser?.firstName ?: 'Owner'}">Owner</span>!
            </h2>
            <p class="text-gray-600">Here's what's happening with your rental business today.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm font-medium">Total Cars</p>
                        <p class="text-3xl font-bold text-gray-800" th:text="${totalVehicles ?: 0}">0</p>
                    </div>
                    <div class="bg-blue-100 p-3 rounded-full">
                        <i class="fas fa-car text-2xl text-blue-600"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-purple-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm font-medium">Available Cars</p>
                        <p class="text-3xl font-bold text-gray-800" th:text="${availableVehicles ?: 0}">0</p>
                    </div>
                    <div class="bg-purple-100 p-3 rounded-full">
                        <i class="fas fa-check-circle text-2xl text-purple-600"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    // Payment Flow V2 - Reject Booking Modal
    function showRejectModal(bookingId) {
        document.getElementById('rejectBookingId').value = bookingId;
        document.getElementById('rejectModal').classList.remove('hidden');
    }

    function closeRejectModal() {
        document.getElementById('rejectModal').classList.add('hidden');
        document.getElementById('rejectReason').value = '';
    }

    function submitReject() {
        const bookingId = document.getElementById('rejectBookingId').value;
        const reason = document.getElementById('rejectReason').value;
        
        if (!reason || reason.trim() === '') {
            alert('Vui lòng nhập lý do từ chối!');
            return;
        }

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = `/owner/booking/${bookingId}/reject`;
        
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'rejectReason';
        input.value = reason;
        
        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
    }
    /*]]>*/
</script>

<!-- Reject Booking Modal -->
<div id="rejectModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4">
        <h3 class="text-xl font-bold text-gray-800 mb-4">Từ Chối Đơn Đặt Xe</h3>
        <input type="hidden" id="rejectBookingId">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">Lý do từ chối:</label>
            <textarea id="rejectReason" 
                      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500" 
                      rows="4" 
                      placeholder="Ví dụ: Xe đang bảo trì, không thể cho thuê trong thời gian này"></textarea>
        </div>
        <div class="flex space-x-3">
            <button onclick="closeRejectModal()" 
                    class="flex-1 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                Hủy
            </button>
            <button onclick="submitReject()" 
                    class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                Xác Nhận Từ Chối
            </button>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
